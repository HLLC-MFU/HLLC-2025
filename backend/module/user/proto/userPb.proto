syntax = "proto3";

package user;

option go_package = "github.com/HLLC-MFU/HLLC-2025/backend/module/user/proto/generated;generated";

message Name {
  string first = 1;
  string middle = 2;
  string last = 3;
}

message User {
  string id = 1;
  Name name = 2;
  string username = 3;
  string password = 5;
  repeated string role_ids = 6; // role id list
  int64 created_at = 7;
  int64 updated_at = 8;
  
}
